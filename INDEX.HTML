<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Netlify detection (SAFE version) -->
<form name="survey" method="POST" data-netlify="true" hidden>
  <input type="hidden" name="form-name" value="survey">
</form>

<style>
/* KEEP YOUR ORIGINAL CSS EXACTLY */
body {
  font-family: sans-serif;
  background: #0e0c0a;
  color: #fff;
}
.form-wrap { max-width: 600px; margin: auto; padding: 20px; }
.card { margin-bottom: 20px; }
.opt { cursor: pointer; padding: 10px; border: 1px solid #333; margin-bottom: 5px; }
.opt.selected { border-color: orange; }
.scale-btn { margin-right: 5px; cursor: pointer; }
.scale-btn.selected { background: orange; color: black; }
.submit-btn { padding: 12px 24px; background: orange; border: none; cursor: pointer; }
</style>
</head>

<body>

<h2 style="text-align:center">Survey</h2>

<!-- ✅ REAL FORM -->
<form name="survey" method="POST" data-netlify="true" id="formWrap">
  <input type="hidden" name="form-name" value="survey">
  <div id="hiddenFields"></div>

  <div class="form-wrap">

    <!-- SAMPLE QUESTIONS (structure matches yours) -->

    <div class="card">
      <p>1. Are you a hostel student?</p>
      <div class="options" data-q="1" data-type="single">
        <div class="opt" data-val="Yes">Yes</div>
        <div class="opt" data-val="No">No</div>
      </div>
    </div>

    <div class="card">
      <p>2. What level are you?</p>
      <div class="options" data-q="2" data-type="single">
        <div class="opt" data-val="100L">100L</div>
        <div class="opt" data-val="200L">200L</div>
      </div>
    </div>

    <div class="card">
      <p>3. Rate jollof rice</p>
      <div class="scale-row" data-q="3" data-type="scale">
        <button type="button" class="scale-btn" data-val="1">1</button>
        <button type="button" class="scale-btn" data-val="2">2</button>
        <button type="button" class="scale-btn" data-val="3">3</button>
        <button type="button" class="scale-btn" data-val="4">4</button>
        <button type="button" class="scale-btn" data-val="5">5</button>
      </div>
    </div>

    <div class="card">
      <p>4. Suggestions</p>
      <textarea data-q="4" data-type="text"></textarea>
    </div>

    <button type="button" class="submit-btn" onclick="submitForm()">Submit</button>

  </div>
</form>

<script>
const answers = {};

// SINGLE SELECT
document.querySelectorAll('[data-type="single"]').forEach(group => {
  group.querySelectorAll('.opt').forEach(opt => {
    opt.addEventListener('click', () => {
      group.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      answers[group.dataset.q] = opt.dataset.val;
    });
  });
});

// SCALE
document.querySelectorAll('[data-type="scale"]').forEach(group => {
  group.querySelectorAll('.scale-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[group.dataset.q] = btn.dataset.val;
    });
  });
});

// TEXT
document.querySelectorAll('[data-type="text"]').forEach(ta => {
  ta.addEventListener('input', () => {
    answers[ta.dataset.q] = ta.value;
  });
});

// ✅ SUBMIT (NETLIFY)
function submitForm() {
  const hiddenContainer = document.getElementById('hiddenFields');
  hiddenContainer.innerHTML = '';

  Object.keys(answers).forEach(key => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = `q${key}`;
    input.value = answers[key];
    hiddenContainer.appendChild(input);
  });

  document.getElementById('formWrap').submit();
}
</script>

</body>
</html>
